services:
  - type: web
    name: circuitmind-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # You will paste this value in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
